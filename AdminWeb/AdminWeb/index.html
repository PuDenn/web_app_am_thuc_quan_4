<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Ẩm Thực Quận 4</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <h1>🍜 Ẩm Thực Quận 4</h1>
    <p>Đăng nhập vào trang quản trị</p>

    <div class="form-group">
      <label>Tên đăng nhập</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <p class="login-error" id="loginError"></p>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Đăng nhập</button>

    <p style="font-size:12px;color:#94a3b8;text-align:center;margin-top:16px">
      Demo: admin / Admin@123
    </p>
  </div>
</div>

<script type="module">
  import { login } from './js/auth.js';
  import { getToken } from './js/auth.js';

  // Nếu đã đăng nhập thì redirect luôn
  if (getToken()) location.href = 'dashboard.html';

  window.doLogin = async function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    if (!username || !password) {
      errEl.textContent = 'Vui lòng nhập đầy đủ thông tin';
      errEl.style.display = 'block'; return;
    }

    btn.textContent = 'Đang đăng nhập...';
    btn.disabled = true;
    errEl.style.display = 'none';

    try {
      await login(username, password);
      location.href = 'dashboard.html';
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.textContent = 'Đăng nhập';
      btn.disabled = false;
    }
  };

  // Bấm Enter
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
